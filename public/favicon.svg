<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2C4D"/>
      <stop offset="100%" stop-color="#07101F"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="-8%" r="72%">
      <stop offset="0%"  stop-color="#E63946" stop-opacity="0.43"/>
      <stop offset="50%" stop-color="#E63946" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background + glow -->
  <rect width="512" height="512" rx="116" ry="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" ry="116" fill="url(#glow)"/>
  <!-- Gold border -->
  <rect width="512" height="512" rx="116" ry="116" fill="none" stroke="#F2C541" stroke-width="6"/>

  <!-- p&g — Bricolage Grotesque 800 -->
  <g font-family="'Bricolage Grotesque', 'Arial Black', sans-serif" font-weight="800" font-size="210">
    <text x="52"  y="338" fill="#FFFFFF">p</text>
    <text x="204" y="318" fill="#E63946" font-style="italic" font-size="164" transform="skewX(-8)">&#38;</text>
    <text x="342" y="338" fill="#F2C541">g</text>
  </g>
</svg>
